name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional release tag to attach the APK to, for example v1.0.0
        required: false
        type: string
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          npm ci

      - name: Sync Capacitor Android project
        run: |
          npx cap sync android

      - name: Make Gradle wrapper executable
        run: |
          chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk SmartStock-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartstock-debug-apk
          path: SmartStock-debug.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release' || github.event.inputs.tag_name != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
          files: SmartStock-debug.apk
